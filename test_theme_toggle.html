<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Theme Toggle Test</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        transition: all 0.3s ease;
      }

      /* Light theme (default) */
      :root {
        --bg-color: #ffffff;
        --text-color: #000000;
        --button-bg: #007bff;
        --button-text: #ffffff;
      }

      /* Dark theme */
      html[data-theme="dark"] {
        --bg-color: #1a1a1a;
        --text-color: #ffffff;
        --button-bg: #0056b3;
        --button-text: #ffffff;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-color);
      }

      #light-toggle {
        background-color: var(--button-bg);
        color: var(--button-text);
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
      }

      #light-toggle:hover {
        opacity: 0.8;
      }

      .theme-info {
        margin-top: 20px;
        padding: 10px;
        border: 1px solid var(--text-color);
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <h1>Theme Toggle Test</h1>
    <p>Click the button below to toggle between light and dark themes:</p>

    <button id="light-toggle" title="Change theme" aria-label="Switch theme">
      <i id="light-toggle-dark">🌙</i>
      <i id="light-toggle-light">☀️</i>
      Toggle Theme
    </button>

    <div class="theme-info">
      <h3>Current Theme Information:</h3>
      <p>Theme Setting: <span id="theme-setting">Loading...</span></p>
      <p>Computed Theme: <span id="computed-theme">Loading...</span></p>
      <p>Data Theme Attribute: <span id="data-theme">Loading...</span></p>
      <p>Local Storage: <span id="local-storage">Loading...</span></p>
    </div>

    <script>
      // Copy the theme functions from our theme.js
      let toggleThemeSetting = () => {
        let themeSetting = determineThemeSetting();
        if (themeSetting == "light") {
          setThemeSetting("dark");
        } else {
          setThemeSetting("light");
        }
      };

      let setThemeSetting = (themeSetting) => {
        localStorage.setItem("theme", themeSetting);
        document.documentElement.setAttribute("data-theme-setting", themeSetting);
        applyTheme();
        updateThemeInfo();
      };

      let applyTheme = () => {
        let theme = determineComputedTheme();
        document.documentElement.setAttribute("data-theme", theme);

        // Update icon visibility
        const darkIcon = document.getElementById("light-toggle-dark");
        const lightIcon = document.getElementById("light-toggle-light");

        if (theme === "dark") {
          darkIcon.style.display = "none";
          lightIcon.style.display = "inline";
        } else {
          darkIcon.style.display = "inline";
          lightIcon.style.display = "none";
        }
      };

      let determineThemeSetting = () => {
        let themeSetting = localStorage.getItem("theme");
        if (themeSetting != "dark" && themeSetting != "light") {
          themeSetting = "light";
        }
        return themeSetting;
      };

      let determineComputedTheme = () => {
        return determineThemeSetting();
      };

      let updateThemeToggleAccessibility = () => {
        const mode_toggle = document.getElementById("light-toggle");
        const currentTheme = determineComputedTheme();
        const nextTheme = currentTheme === "light" ? "dark" : "light";

        if (mode_toggle) {
          mode_toggle.setAttribute("aria-label", `Switch to ${nextTheme} theme`);
          mode_toggle.setAttribute("aria-pressed", currentTheme === "dark" ? "true" : "false");
          mode_toggle.title = `Switch to ${nextTheme} theme (current: ${currentTheme})`;
        }
      };

      let updateThemeInfo = () => {
        document.getElementById("theme-setting").textContent = determineThemeSetting();
        document.getElementById("computed-theme").textContent = determineComputedTheme();
        document.getElementById("data-theme").textContent = document.documentElement.getAttribute("data-theme") || "none";
        document.getElementById("local-storage").textContent = localStorage.getItem("theme") || "none";
      };

      let initTheme = () => {
        let themeSetting = determineThemeSetting();
        setThemeSetting(themeSetting);

        document.addEventListener("DOMContentLoaded", function () {
          const mode_toggle = document.getElementById("light-toggle");

          if (!mode_toggle) {
            console.warn("Theme toggle button not found");
            return;
          }

          updateThemeToggleAccessibility();

          mode_toggle.addEventListener("click", function () {
            toggleThemeSetting();
            updateThemeToggleAccessibility();
          });

          mode_toggle.addEventListener("keydown", function (e) {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              toggleThemeSetting();
              updateThemeToggleAccessibility();
            }
          });

          updateThemeInfo();
        });
      };

      initTheme();
    </script>
  </body>
</html>
